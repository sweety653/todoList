<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <header>
        <h1 class="gradient-text">Мои задачи</h1>
        <p id="counter">Осталось 0 задач</p>
        <button id="BtnComp" class="Comp">Удалить выполненые</button>
        </header>
        
        
        <form id="addForm">
        <input type="text" id="taskInput" placeholder="Что надо сделать">
        <button type="submit">Добавить</button>
        </form>


        <div id="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="done">Выполненые</button>
        </div>

        <ul id="todoList">

        </ul>
    </main>



    <script src="script.js"></script>
</body>
</html>
